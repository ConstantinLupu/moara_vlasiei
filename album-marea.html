<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Marea Neagră - Cinematic</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET SI STILURI DE BAZA --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #000; 
            color: white; 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- IMAGINEA DE FUNDAL (FULL SCREEN) --- */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
        }
        
        .bg-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Un gradient ușor mai rece/albăstrui pentru Marea Neagră */
            background: linear-gradient(to right, rgba(0,10,20,0.85) 0%, rgba(0,10,20,0.5) 50%, rgba(0,0,0,0.1) 100%);
        }

        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: opacity 0.5s ease-in-out;
        }

        /* --- NAVIGARE SUS --- */
        nav { 
            position: absolute; 
            top: 0; 
            width: 100%; 
            padding: 20px; 
            display: flex; 
            justify-content: flex-end; 
            z-index: 100;
        }
        nav a { 
            color: white; 
            text-decoration: none; 
            padding: 10px 20px; 
            margin: 0 5px; 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(5px);
            border-radius: 30px; 
            font-weight: bold; 
            transition: 0.3s;
            font-size: 14px;
        }
        nav a:hover { background-color: #00bcd4; color: #fff; }

        /* --- CONTINUT PRINCIPAL --- */
        .main-content {
            display: flex;
            align-items: flex-end; 
            height: 100vh;
            padding: 0 5% 70px 5%; 
            gap: 50px;
            position: relative;
            z-index: 20; 
        }

        /* --- PARTEA STANGA (TEXT MARE) --- */
        .text-area {
            flex: 1; 
            max-width: 500px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .location-tag {
            color: #00bcd4; /* Cyan oceanic */
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 10px;
            display: block;
        }

        .title {
            font-family: 'Oswald', sans-serif;
            font-size: 70px; 
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .description {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ddd;
            text-shadow: 1px 1px 3px black;
        }

        .discover-btn {
            padding: 15px 30px;
            background-color: #00bcd4; 
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.4);
        }
        .discover-btn:hover { background-color: #0097a7; transform: scale(1.05); }

        /* --- PARTEA DREAPTA (CARDURILE MICI) --- */
        .slider-area {
            flex: 1;
            display: flex;
            gap: 20px;
            overflow-x: auto; 
            padding-bottom: 20px;
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .slider-area::-webkit-scrollbar { display: none; }

        .card {
            min-width: 180px;
            height: 280px;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
            -webkit-user-select: none;
            user-select: none;
        }

        .card:hover { transform: translateY(-10px); }
        
        .card.active {
            border-color: #00bcd4;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.6);
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,10,20,0.9), transparent);
        }

        .card-info h4 {
            margin: 0;
            font-size: 14px;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
            color: #fff;
        }

        /* --- FOOTER --- */
        .main-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8); 
            color: #aaa;
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            z-index: 150; 
            border-top: 1px solid #111;
        }

        .main-footer span {
            color: #00bcd4; 
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; padding: 80px 20px 60px 20px; justify-content: flex-end; }
            .title { font-size: 36px; }
            .slider-area { width: 100%; }
            .card { min-width: 120px; height: 180px; }
            .main-footer { padding: 15px 5px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img id="bg-image" src="" alt="Fundal Marea Neagră">
    </div>

    <nav>
        <a href="index.html">Acasă</a>
        <a href="poze.html">Înapoi la Albume</a>
    </nav>

    <div class="main-content">
        
        <div class="text-area">
            <span class="location-tag">Natură / Litoral</span>
            <h1 class="title" id="main-title">MAREA NEAGRĂ</h1>
            <p class="description" id="main-desc">
                Se încarcă magia mării...
            </p>
            <a href="#" class="discover-btn">Explorează</a>
        </div>

        <div class="slider-area" id="slider-container">
            </div>

    </div>

    <footer class="main-footer">
        2026 Creator WebSite & Pasionat de Drumeții - <span>Lupu Constantin</span>. Toate drepturile rezervate.
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURARE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDcRKJjZF5lIUwYwc_ty_0edMJs3jv60_A",
            authDomain: "jurnal-amintiri.firebaseapp.com",
            projectId: "jurnal-amintiri",
            storageBucket: "jurnal-amintiri.firebasestorage.app",
            messagingSenderId: "417791897007",
            appId: "1:417791897007:web:03789196260a2a3832135a",
            databaseURL: "https://jurnal-amintiri-default-rtdb.firebaseio.com" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // DATE STANDARD ÎN CAZ CĂ BAZA ESTE GOALĂ
        const defaultMareaNeagra = [
            { src: "Imagini/Marea Neagra/1.jpg", title: "Cazinoul din Constanța", desc: "Simbolul istoric al orașului, veghează marea de peste un secol." },
            { src: "Imagini/Marea Neagra/2.jpg", title: "Răsărit pe Plajă", desc: "Soarele răsare din mare, pictând cerul în culori calde." },
            { src: "Imagini/Marea Neagra/3.jpg", title: "Portul Tomis", desc: "Bărcile și iahturile ancorate într-o zi liniștită de vară." },
            { src: "Imagini/Marea Neagra/4.jpg", title: "Valuri Înspumate", desc: "Puterea și frumusețea mării într-o zi cu vânt." },
            { src: "Imagini/Marea Neagra/5.jpg", title: "Pescarușii", desc: "Gardienii zburători ai litoralului." },
            { src: "Imagini/Marea Neagra/6.jpg", title: "Faleza", desc: "Locul perfect pentru o plimbare lungă la apus." },
            { src: "Imagini/Marea Neagra/7.jpg", title: "Nisip Fin", desc: "Detaliu de pe plaja din Mamaia." },
            { src: "Imagini/Marea Neagra/8.jpg", title: "Farul Genovez", desc: "Un monument istoric ce ghida odinioară corăbiile." },
            { src: "Imagini/Marea Neagra/9.jpg", title: "Seara la Mare", desc: "Luminile orașului se reflectă în apa întunecată." },
            { src: "Imagini/Marea Neagra/10.jpg", title: "Digul de Piatră", desc: "Punctul de întâlnire dintre om și largul mării." },
            { src: "Imagini/Marea Neagra/11.jpg", title: "Orizont Albastru", desc: "Linia fină unde cerul se unește cu marea." }
        ];

        let locations = [];
        let currentIndex = 0;

        const bgImage = document.getElementById('bg-image');
        const mainTitle = document.getElementById('main-title');
        const mainDesc = document.getElementById('main-desc');
        const sliderContainer = document.getElementById('slider-container');

        // FUNCTIA CARE CREEAZA GALERIA
        function initGallery() {
            sliderContainer.innerHTML = ''; 
            
            locations.forEach((loc, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                if (index === currentIndex) card.classList.add('active'); 

                // Event Listeners pentru Click si Touch
                card.onclick = () => changeSlide(index);
                card.addEventListener('touchstart', () => changeSlide(index), {passive: true});

                card.innerHTML = `
                    <img src="${loc.src}" onerror="this.src='https://via.placeholder.com/200x300?text=Lipsa+Poza'" alt="${loc.title}">
                    <div class="card-info">
                        <h4>${loc.title}</h4>
                    </div>
                `;
                sliderContainer.appendChild(card);
            });
            updateDisplay();
        }

        // SCHIMBAREA SLIDE-ULUI
        function changeSlide(index) {
            currentIndex = index;
            updateDisplay();
        }

        // UPDATE AFISAJ PRINCIPAL (TEXT + BACKGROUND)
        function updateDisplay() {
            if (locations.length === 0) return;
            const currentLoc = locations[currentIndex];

            bgImage.style.opacity = 0;
            setTimeout(() => {
                bgImage.src = currentLoc.src;
                bgImage.onerror = () => { bgImage.style.backgroundColor = '#001020'; };
                bgImage.onload = () => { bgImage.style.opacity = 1; };
            }, 200);

            mainTitle.innerText = currentLoc.title;
            mainDesc.innerText = currentLoc.desc || '';

            const allCards = document.querySelectorAll('.card');
            allCards.forEach(c => c.classList.remove('active'));
            if(allCards[currentIndex]) {
                allCards[currentIndex].classList.add('active');
            }
        }

        // CONECTARE LA BAZA DE DATE (FIREBASE)
        onValue(ref(db, 'marea_neagra_album'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Dacă există date în Firebase, le transformăm în Array și le sortăm (cele mai noi primele)
                locations = Object.keys(data).map(key => data[key]).sort((a,b) => b.timestamp - a.timestamp);
            } else {
                // Dacă baza de date e goală, afișăm datele de rezervă
                locations = [...defaultMareaNeagra]; 
            }
            currentIndex = 0; 
            initGallery();
        });

    </script>
</body>
</html>
